# Backend only. Run: docker compose up --build
# API: http://localhost:8000 (docs: http://localhost:8000/docs)
# Open frontend/index.html in browser; set API base URL to http://localhost:8000
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - PORT=8000
      - API_ONLY=1
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db
      - ./exports:/app/exports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  chroma_data:
